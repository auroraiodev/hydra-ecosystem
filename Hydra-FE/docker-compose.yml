version: "3.9"

services:
  hydra-fe-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3002}"
    container_name: hydra-fe-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - API_URL=${API_URL}
      - BACKEND_API_URL=http://127.0.0.1:3002
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL}
      - NEXT_PUBLIC_SELLER_URL=${NEXT_PUBLIC_SELLER_URL}
      - NEXT_PUBLIC_AUTH_SERVICE_URL=${NEXT_PUBLIC_AUTH_SERVICE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - DB_SSL=${DB_SSL:-false}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - REFRESH_EXPIRES_IN=${REFRESH_EXPIRES_IN:-7d}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_URL=${ADMIN_URL}
      - SELLER_URL=${SELLER_URL}
      - HYDRA_FE_URL=${HYDRA_FE_URL}
      - HYDRA_ADMIN_URL=${HYDRA_ADMIN_URL}
      - HYDRA_SELLER_URL=${HYDRA_SELLER_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - NOTIFY_SERVICE_URL=${NOTIFY_SERVICE_URL}
      - MTGSRC_SERVICE_URL=${MTGSRC_SERVICE_URL}
      - CATALOG_SERVICE_URL=${CATALOG_SERVICE_URL}
      - COMMERCE_SERVICE_URL=${COMMERCE_SERVICE_URL}
      - ENGAGE_SERVICE_URL=${ENGAGE_SERVICE_URL}
      - ADMIN_SVC_URL=${ADMIN_SVC_URL}
      - USE_COMMERCE_MICROSERVICE=${USE_COMMERCE_MICROSERVICE:-true}
      - USE_ENGAGE_MICROSERVICE=${USE_ENGAGE_MICROSERVICE:-true}
      - USE_ADMIN_MICROSERVICE=${USE_ADMIN_MICROSERVICE:-true}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_ADMIN=${EMAIL_ADMIN}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-garage}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-hydra-images}
      - STORAGE_S3_PUBLIC_URL=${STORAGE_S3_PUBLIC_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OCR_SPACE_API_KEY=${OCR_SPACE_API_KEY}
      - IMPORTATION_API_USER_ID=${IMPORTATION_API_USER_ID}
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: hydra-fe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  redis-data:
