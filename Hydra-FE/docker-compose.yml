version: "3.9"

services:
  hydra-fe-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3002}"
    container_name: hydra-fe-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_API_URL=http://127.0.0.1:3002
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3002}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - REDIS_URL=${REDIS_URL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-localhost}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@hydracollect.com}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY:-}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3002/auth/google/callback}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-dev-revalidate-secret}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT:-}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY:-}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY:-}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-garage}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-hydra-images}
      - STORAGE_S3_PUBLIC_URL=${STORAGE_S3_PUBLIC_URL:-}
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: hydra-fe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  redis-data:
