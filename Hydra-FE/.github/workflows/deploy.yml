name: Deploy Hydra-FE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: |
          bun install --cwd app
          bun install --cwd backend

      - name: Type check
        run: |
          bun --cwd app type-check || true
          bun --cwd backend type-check || true

      - name: Lint
        run: |
          bun --cwd app lint || true
          bun --cwd backend lint || true

      - name: Run tests
        run: |
          bun --cwd app test || true
          bun --cwd backend test || true

      - name: Deploy to Coolify
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK_URL" ]; then
            curl -X POST "$COOLIFY_WEBHOOK_URL"
          else
            echo "COOLIFY_WEBHOOK_URL not set — skipping deployment trigger"
          fi
